<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <title>Iniciar Sesión — Seguimiento Actividad Precursores Alameda Del Rio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e, #283593);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,.3);
        }
        .login-icon {
            width: 72px;
            height: 72px;
            background: rgba(26,35,126,.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #1a237e;
            margin: 0 auto;
        }
        .form-control {
            border-radius: 12px;
            padding: .75rem 1rem;
            font-size: 1rem;
        }
        .btn-primary {
            border-radius: 12px;
            padding: .75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a237e, #283593);
            border: none;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #283593, #1a237e); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <div class="login-icon mb-3">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h4 class="fw-bold">Seguimiento Actividad<br>Precursores Alameda Del Rio</h4>
                        <p class="text-muted small">Ingresa la contraseña para continuar</p>
                        <div class="d-flex justify-content-center gap-2 mb-2">
                            <span class="badge bg-primary bg-opacity-10 text-primary small px-2 py-1">
                                <i class="bi bi-shield-lock me-1"></i>Admin
                            </span>
                            <span class="badge bg-secondary bg-opacity-10 text-secondary small px-2 py-1">
                                <i class="bi bi-eye me-1"></i>Invitado
                            </span>
                        </div>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger py-2 small">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="Ingresa la contraseña" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted small mb-2"><i class="bi bi-person-fill me-1"></i>Acceso para precursores</p>
                        <div class="input-group">
                            <input type="text" id="tokenInput" class="form-control" placeholder="Pega tu token aquí" style="border-radius:12px 0 0 12px;">
                            <button class="btn btn-outline-primary" onclick="accederToken()" style="border-radius:0 12px 12px 0;">
                                <i class="bi bi-arrow-right"></i>
                            </button>
                        </div>
                    </div>

                    <script>
                    function accederToken() {
                        const token = document.getElementById('tokenInput').value.trim();
                        if (token) {
                            window.location.href = '/acceso/' + encodeURIComponent(token);
                        }
                    }
                    document.getElementById('tokenInput').addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') accederToken();
                    });
                    </script>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
